name: Run Zizmor
on:
  pull_request:

permissions: {}

jobs:
  zizmor:
    permissions:
      contents: read

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Zizmor
        id: zizmor
        uses: ./install-zizmor

      - name: Scan Repo
        env:
          ZIZMOR_EXE: ${{ steps.zizmor.outputs.exe }}
        run: |
          "$ZIZMOR_EXE" --strict-collection ./
